<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contracts – FreelanceHub</title>
  <meta name="description" content="Manage freelance contracts on FreelanceHub. Create, view and track contract statuses." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">⚡ FreelanceHub</div>
  <div class="nav-links">
    <a href="/app/">Home</a>
    <a href="/app/projects/">Projects</a>
    <a href="/app/bids/">Bids</a>
    <a href="/app/contracts/" class="active">Contracts</a>
    <a href="/app/dashboard/">Dashboard</a>
  </div>
  <div class="nav-actions">
    <a href="/app/login/"    class="btn btn-ghost">Login</a>
    <a href="/app/register/" class="btn btn-primary">Register</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <div class="section-tag">Agreements</div>
          <h1 class="page-header-title">📜 Contract Management</h1>
          <p class="page-header-sub">Create and manage contracts between clients and freelancers.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('contract-modal')">
          ➕ New Contract
        </button>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Project</th>
              <th>Freelancer</th>
              <th>Client</th>
              <th>Budget (₹)</th>
              <th>Duration</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="contracts-table-body">
            <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading contracts…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<!-- ── Modal: New Contract ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="contract-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📜 Create Contract</div>
      <button class="modal-close" onclick="closeModal('contract-modal')">×</button>
    </div>
    <form id="contract-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="con-project">Project Title *</label>
          <input type="text" id="con-project" placeholder="E-Commerce Website" required />
        </div>
        <div class="form-group">
          <label for="con-budget">Agreed Budget (₹) *</label>
          <input type="number" id="con-budget" placeholder="45000" min="0" required />
        </div>
        <div class="form-group">
          <label for="con-freelancer">Freelancer Name *</label>
          <input type="text" id="con-freelancer" placeholder="Rahul Sharma" required />
        </div>
        <div class="form-group">
          <label for="con-client">Client Name *</label>
          <input type="text" id="con-client" placeholder="Tech Solutions Pvt Ltd" required />
        </div>
        <div class="form-group">
          <label for="con-start">Start Date *</label>
          <input type="date" id="con-start" required />
        </div>
        <div class="form-group">
          <label for="con-end">End Date *</label>
          <input type="date" id="con-end" required />
        </div>
        <div class="form-group full">
          <label for="con-status">Contract Status</label>
          <select id="con-status">
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('contract-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">📜 Create Contract</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Modal: Edit Contract ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="edit-contract-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ Edit Contract</div>
      <button class="modal-close" onclick="closeModal('edit-contract-modal')">×</button>
    </div>
    <form id="edit-contract-form">
      <input type="hidden" id="edit-con-id" />
      <div class="form-grid">
        <div class="form-group">
          <label for="edit-con-project">Project Title</label>
          <input type="text" id="edit-con-project" />
        </div>
        <div class="form-group">
          <label for="edit-con-budget">Agreed Budget (₹)</label>
          <input type="number" id="edit-con-budget" />
        </div>
        <div class="form-group">
          <label for="edit-con-freelancer">Freelancer Name</label>
          <input type="text" id="edit-con-freelancer" />
        </div>
        <div class="form-group">
          <label for="edit-con-client">Client Name</label>
          <input type="text" id="edit-con-client" />
        </div>
        <div class="form-group">
          <label for="edit-con-start">Start Date</label>
          <input type="date" id="edit-con-start" />
        </div>
        <div class="form-group">
          <label for="edit-con-end">End Date</label>
          <input type="date" id="edit-con-end" />
        </div>
        <div class="form-group full">
          <label for="edit-con-status">Contract Status</label>
          <select id="edit-con-status">
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('edit-contract-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
