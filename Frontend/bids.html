<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bids – FreelanceHub</title>
  <meta name="description" content="Submit and manage project bids on FreelanceHub. Accept or reject proposals as a client." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">⚡ FreelanceHub</div>
  <div class="nav-links">
    <a href="/app/">Home</a>
    <a href="/app/projects/">Projects</a>
    <a href="/app/bids/" class="active">Bids</a>
    <a href="/app/contracts/">Contracts</a>
    <a href="/app/dashboard/">Dashboard</a>
  </div>
  <div class="nav-actions">
    <a href="/app/login/"    class="btn btn-ghost">Login</a>
    <a href="/app/register/" class="btn btn-primary">Register</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <div class="section-tag">Proposals</div>
      <h1 class="page-header-title">💼 Bid Management</h1>
      <p class="page-header-sub">Submit proposals for projects or manage received bids as a client.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 1.8fr;gap:2rem;align-items:start">

        <!-- Submit Bid Form ──────────────────────────────────────────────── -->
        <div class="form-card" style="position:sticky;top:calc(var(--nav-height) + 1.5rem)">
          <div class="form-title">📝 Submit a Bid</div>
          <div class="form-sub">Send your best proposal to win the project.</div>

          <form id="bid-form">
            <div class="form-group mb-3">
              <label for="bid-project-title">Project Title *</label>
              <input type="text" id="bid-project-title" placeholder="E-Commerce Website" required />
            </div>
            <div class="form-group mb-3">
              <label for="bid-freelancer">Your Name *</label>
              <input type="text" id="bid-freelancer" placeholder="Rahul Sharma" required />
            </div>
            <div class="form-group mb-3">
              <label for="bid-amount">Bid Amount (₹) *</label>
              <input type="number" id="bid-amount" placeholder="45000" min="0" required />
            </div>
            <div class="form-group mb-3">
              <label for="bid-proposal">Proposal / Cover Letter *</label>
              <textarea id="bid-proposal" rows="5" placeholder="Describe your approach, timeline, and why you're the best fit…" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="justify-content:center">
              🚀 Submit Bid
            </button>
          </form>
        </div>

        <!-- Bids Table ──────────────────────────────────────────────────── -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
            <h2 style="font-size:1.25rem;font-weight:800">All Bids</h2>
            <button class="btn btn-ghost btn-sm" onclick="loadBids()">🔄 Refresh</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Project</th>
                  <th>Freelancer</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bids-table-body">
                <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </section>
</div>

<script src="/static/script.js"></script>
</body>
</html>
