<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – FreelanceHub</title>
  <meta name="description" content="Login to your FreelanceHub account as a freelancer or client." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">⚡ FreelanceHub</div>
  <div class="nav-links">
    <a href="/app/">Home</a>
    <a href="/app/projects/">Projects</a>
    <a href="/app/bids/">Bids</a>
    <a href="/app/contracts/">Contracts</a>
    <a href="/app/dashboard/">Dashboard</a>
  </div>
  <div class="nav-actions">
    <a href="/app/register/" class="btn btn-primary">Register</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">⚡ FreelanceHub</div>
      <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:.25rem;text-align:center">Welcome Back</h1>
      <p style="text-align:center;color:var(--text-secondary);font-size:.9rem;margin-bottom:1.75rem">Sign in to your account to continue.</p>

      <form id="login-form">
        <div class="form-group mb-3">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>

        <div class="form-group mb-3">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>

        <div class="form-group mb-3">
          <label for="login-role">Login As</label>
          <select id="login-role">
            <option value="freelancer">🧑‍💻 Freelancer</option>
            <option value="client">🏢 Client</option>
            <option value="admin">🛡️ Admin</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="login-btn" style="justify-content:center;padding:.85rem">
          Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <p style="text-align:center;font-size:.9rem;color:var(--text-secondary)">
        Don't have an account?
        <a href="/app/register/" style="color:var(--purple-400);font-weight:600">Register here →</a>
      </p>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
